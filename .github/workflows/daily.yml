name: Daily Summary

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Generate daily summary
        run: uv run python -m src.cli daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit daily summary
        run: |
          git config user.name "newsletter-bot"
          git config user.email "bot@newsletter"
          git add output/
          git diff --staged --quiet || git commit -m "feat: daily summary $(date -u +%Y-%m-%d)"
          git push
