name: Refresh Twitter Cookies

# Twitter blocks login from datacenter IPs, so this workflow
# cannot run automated cookie refresh. Instead, run locally:
#
#   source .env && uv run python scripts/refresh_cookies.py
#
# This updates both cookies.json and the TWITTER_COOKIES_B64 secret.
# The auth_token cookie lasts ~5 years, so this is rarely needed.
#
# This workflow exists as a manual fallback — it may work if
# Twitter relaxes datacenter IP restrictions in the future.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: Refresh cookies
        id: cookies
        run: |
          COOKIES_B64=$(uv run python scripts/refresh_cookies.py)
          echo "cookies_b64=$COOKIES_B64" >> "$GITHUB_OUTPUT"
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}

      - name: Update TWITTER_COOKIES_B64 secret
        env:
          COOKIES_B64: ${{ steps.cookies.outputs.cookies_b64 }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set TWITTER_COOKIES_B64 --body "$COOKIES_B64"

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: twitter-login-debug
          path: /tmp/twitter_login_debug.png
          if-no-files-found: ignore
