name: Weekly Roundup

on:
  schedule:
    - cron: '0 7 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Generate weekly roundup
        run: uv run python -m src.cli weekly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit weekly roundup
        run: |
          git config user.name "newsletter-bot"
          git config user.email "bot@newsletter"
          git add output/
          git diff --staged --quiet || git commit -m "feat: weekly roundup $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: weekly
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
